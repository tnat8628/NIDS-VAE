name: nids-vae

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: nids-vae-backend:local
    container_name: nids-vae-backend
    environment:
      DEBUG_INFERENCE: "false"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - nids-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    image: nids-vae-frontend:local
    container_name: nids-vae-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    networks:
      - nids-network

networks:
  nids-network:
    driver: bridge

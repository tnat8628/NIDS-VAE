name: nids-vae

services:
  db:
    image: postgres:16-alpine
    container_name: nids-vae-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nids_vae}
      POSTGRES_USER: ${POSTGRES_USER:-nids_vae}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nids_vae_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nids-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: nids-vae-backend:local
    container_name: nids-vae-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://nids_vae:nids_vae_dev@db:5432/nids_vae}
      DEBUG_INFERENCE: "false"
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - nids-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    image: nids-vae-frontend:local
    container_name: nids-vae-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    networks:
      - nids-network

networks:
  nids-network:
    driver: bridge

volumes:
  postgres_data: